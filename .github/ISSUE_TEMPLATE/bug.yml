name: Bug report
description: Something is broken or behaving unexpectedly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report this — every detail helps.
  - type: input
    id: version
    attributes:
      label: Marky version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows
        - Linux
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, what did you see instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open a file with X
        2. Click Y
        3. Observe Z
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Logs, screenshots, file samples — drag them in here.
